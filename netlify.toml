# Netlify config for cuzenti.com.
#
# Two non-obvious things this file does:
#   1. Forces application/json on apple-app-site-association. Apple's CDN
#      will not accept the file otherwise — even though it has no .json
#      extension, the body MUST be served as application/json.
#   2. Rewrites /join/<code> to /join.html?code=<code> so we don't need
#      per-code static pages. The 200 status means the URL bar stays at
#      /join/<code>, which is what the Universal Link / App Link matcher
#      on the OS side is looking for.

[build]
  publish = "."

# Friendly URL: /join/ABC123 → /join.html?code=ABC123
[[redirects]]
  from = "/join/*"
  to = "/join.html?code=:splat"
  status = 200

# Apple App Site Association — must be served as application/json and
# without a file extension. Netlify's default would serve it as
# application/octet-stream; Apple's CDN rejects that.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"
